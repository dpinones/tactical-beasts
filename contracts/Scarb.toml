[package]
name = "tactical_beats"
version = "0.1.0"
edition = "2024_07"

[cairo]
sierra-replace-ids = true

[dependencies]
dojo = "1.8.0"
starknet = "2.15.1"
game_components_embeddable_game_standard = { git = "https://github.com/Provable-Games/game-components.git" }
game_components_utilities = { git = "https://github.com/Provable-Games/game-components.git" }
openzeppelin_introspection = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0" }

[dev-dependencies]
cairo_test = "2.15.1"
dojo_cairo_test = "1.8.0"

[tool.fmt]
sort-module-level-items = true
max-line-length = 120

[tool.scarb]
allow-prebuilt-plugins = ["dojo_cairo_macros"]

[[target.starknet-contract]]
build-external-contracts = ["dojo::world::world_contract::world"]

[profile.sepolia]
[profile.mainnet]
